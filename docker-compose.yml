# EMS pair — single-command local deployment (initiative: ems-completion, ticket #4)
#
#   1. cp .env.example .env   (fill in the values — .env is git-ignored)
#   2. docker compose up --build
#   3. Web app on http://localhost:8085 — nginx proxies /api to the API container
#
# The Angular client is built from its SIBLING clone. Default assumes the GitHub
# clone name; override NG_BUILD_CONTEXT in .env if your directory differs.

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}
    # Local-dev convenience: expose SQL Server to the host so GUI tools
    # (SSMS / Azure Data Studio / DBeaver) can connect at localhost,1433.
    # Bound to 127.0.0.1 so it is reachable only from this machine, not the
    # LAN. NOT for shared/prod compose — the SA password lives in .env.
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -b"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    build: .
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Full connection string assembled in .env so no credential fragments live in tracked files
      ConnectionStrings__db: ${EMS_DB_CONNECTION:?set EMS_DB_CONNECTION in .env}
      JWT__Issuer: ${JWT_ISSUER:?set JWT_ISSUER in .env}
      JWT__Audience: ${JWT_AUDIENCE:?set JWT_AUDIENCE in .env}
      JWT__IssuerSigningKey: ${JWT_SIGNING_KEY:?set JWT_SIGNING_KEY in .env}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:?set SEED_ADMIN_PASSWORD in .env}
      # Email: point at the smtp4dev catcher (no auth/SSL in dev). Prod supplies
      # a real relay via these same Email__* vars.
      Email__Host: ${EMAIL_HOST:-mail}
      Email__Port: ${EMAIL_PORT:-25}
      Email__From: ${EMAIL_FROM:-noreply@ems.local}
      Email__UseSsl: ${EMAIL_USE_SSL:-false}
      # Base URL of the ng reset page the emailed link points at.
      App__ResetPasswordUrl: ${APP_RESET_URL:-http://localhost:8085/reset-password-confirm}
      # Attendance check-in window (Egypt local time, HH:mm). Business rule, tunable without a code change.
      Attendance__CheckInStart: ${CHECKIN_START:-07:30}
      Attendance__CheckInEnd: ${CHECKIN_END:-09:00}
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
    volumes:
      - upload-data:/app/Upload
    ports:
      - "8080:8080"   # direct API access for debugging; the web app uses the nginx proxy

  # Local mail catcher — captures all outgoing email (no real sending) and
  # shows it in a web UI at http://localhost:5000. Dev only; prod points the
  # Email__* vars at a real SMTP relay instead.
  mail:
    image: rnwood/smtp4dev:v3
    ports:
      - "127.0.0.1:5000:80"   # web inbox UI (SMTP :25 stays internal to the compose network)

  web:
    build: ${NG_BUILD_CONTEXT:-../Employee-Management-System-ng}
    depends_on:
      - api
    ports:
      - "8085:80"

volumes:
  mssql-data:
  upload-data:
